server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: redis
      port: 6379

  cache:
    type: redis



  kafka:
    bootstrap-servers: kafka-1:9092,kafka-2:9092,kafka-3:9092

kafka:
  topic:
    product-events: product.events.v1

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info